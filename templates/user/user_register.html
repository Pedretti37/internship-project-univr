{% extends "base.html" %}

{% block css %}
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/register.css">
{% endblock %}

{% block content %}
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="name">Create your <strong>User Account</strong></span>
        </div>

        <div class="nav-right">
            <a href="/" class="nav-link">Back</a>
        </div>
    </nav>

    <!-- Main container -->
    <div class="main-container">
        <div class="card">
            {% if error %}
                <div class="error-banner" style="background-color: #ffdddd; color: red; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center;">
                    {{ error }}
                </div>
            {% endif %}

            <h1>Create your Account</h1>

            <form action="/user_register" method="POST" class="reg-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="surname">Surname:</label>
                <input type="text" id="surname" name="surname" required>

                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Register</button>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener('pageshow', function(event) {
            // inputs cleaner
            var form = document.querySelector('.reg-form');
            if (form) {
                form.reset(); // reset form fields
            }
        });
    </script>

{% endblock %}
